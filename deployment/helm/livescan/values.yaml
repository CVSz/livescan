image:
  repository: livescan
  tag: latest
  pullPolicy: IfNotPresent

replicaCount: 2
service:
  port: 80
containerPort: 8000
resources:
  requests:
    cpu: 500m
    memory: 1Gi
  limits:
    cpu: "2"
    memory: 4Gi
autoscaling:
  enabled: true
  minReplicas: 2
  maxReplicas: 10
  cpuUtilization: 70
