apiVersion: apps/v1
kind: Deployment
metadata:
  name: livescan-api
  namespace: livescan
spec:
  replicas: 2
  selector:
    matchLabels:
      app: livescan-api
  template:
    metadata:
      labels:
        app: livescan-api
    spec:
      containers:
        - name: api
          image: livescan:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8000
          resources:
            requests:
              cpu: "500m"
              memory: "1Gi"
              nvidia.com/gpu: "1"
            limits:
              cpu: "2"
              memory: "4Gi"
              nvidia.com/gpu: "1"
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 10
